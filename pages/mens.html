<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EVO - Men's Collection</title>
    <link rel="stylesheet" href="../style.css">

    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 40px 0;
        }

        .section-title {
            text-align: center;
            font-size: 38px;
            margin-bottom: 40px;
            color: #00cfff;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0,255,255,0.15);
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 25px rgba(0,255,255,0.4);
        }

        .product-card img {
            width: 100%;
            height: 420px;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
            text-align: center;
        }

        .product-info h4 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #00cfff;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #00cfff;
            color: black;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn:hover {
            background: white;
        }
    </style>
</head>

<body>

<header>
    <h1>EVO</h1>
    <p>MEN'S COLLECTION</p>
</header>

<div class="container">

    <h2 class="section-title">Men's Apparel</h2>

    <div class="product-grid">

        <div class="product-card">
            <img src="../images/mensu.jpg" alt="">
            <div class="product-info">
                <h4>EVO Elite Tracksuit</h4>
                <p>Performance-fit training wear.</p>
                <p><strong>$89.99</strong></p>
                <a href="#" class="btn">Add to Cart</a>
            </div>
        </div>

        <div class="product-card">
            <img src="../images/IMG_1069.jpg" alt="">
            <div class="product-info">
                <h4>EVO Tech Streetwear</h4>
                <p>Modern oversized training fit.</p>
                <p><strong>$44.99</strong></p>
                <a href="#" class="btn">Add to Cart</a>
            </div>
        </div>

        <div class="product-card">
            <img src="../images/sudadera.jpg" alt="">
            <div class="product-info">
                <h4>EVO Performance Jacket</h4>
                <p>Premium athletic jacket.</p>
                <p><strong>$69.99</strong></p>
                <a href="#" class="btn">Add to Cart</a>
            </div>
        </div>

    </div>
</div>

        <a href="../index.html" class="btn">Back to Home</a>
    </div>
</body>
</html>
